<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fed Aura Capital - AI Financial Advisor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@patternfly/patternfly@6/patternfly.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@patternfly/patternfly@6/patternfly-addons.css">
<style>
  :root {
    --fa-navy: #0a1628;
    --fa-navy-light: #132240;
    --fa-gold: #c9a84c;
    --fa-gold-light: #e8d48b;
  }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--pf-t--global--font--family--text);
    background: var(--pf-t--global--background--color--secondary--default);
    display: flex;
    flex-direction: column;
  }

  /* Header bar */
  .app-header {
    background: var(--fa-navy);
    padding: var(--pf-t--global--spacer--sm) var(--pf-t--global--spacer--lg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .app-header__brand {
    display: flex;
    align-items: center;
    gap: var(--pf-t--global--spacer--sm);
    text-decoration: none;
  }
  .app-header__brand img { height: 32px; width: auto; }
  .app-header__brand-text {
    color: var(--pf-t--global--text--color--inverse);
    font-size: var(--pf-t--global--font--size--lg);
    font-weight: var(--pf-t--global--font--weight--bold);
    letter-spacing: 0.3px;
  }
  .app-header__brand-text .brand-highlight { color: var(--fa-gold); }
  .user-label {
    color: var(--fa-gold-light);
    font-size: var(--pf-t--global--font--size--sm);
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--pf-t--global--color--status--success--default);
    border-radius: 50%;
    margin-right: var(--pf-t--global--spacer--xs);
  }

  /* Chat layout */
  .chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 840px;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: var(--pf-t--global--spacer--lg) var(--pf-t--global--spacer--md);
    display: flex;
    flex-direction: column;
    gap: var(--pf-t--global--spacer--md);
  }

  /* Welcome */
  .welcome-block {
    text-align: center;
    padding: var(--pf-t--global--spacer--2xl) var(--pf-t--global--spacer--md) var(--pf-t--global--spacer--sm);
  }
  .welcome-block h2 {
    font-size: var(--pf-t--global--font--size--xl);
    font-weight: var(--pf-t--global--font--weight--bold);
    color: var(--fa-navy);
    margin-bottom: var(--pf-t--global--spacer--xs);
  }
  .welcome-block p {
    font-size: var(--pf-t--global--font--size--md);
    color: var(--pf-t--global--text--color--subtle);
  }

  /* Message rows */
  .msg-row {
    display: flex;
    gap: var(--pf-t--global--spacer--sm);
    max-width: 85%;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.assistant { align-self: flex-start; }

  /* Avatars */
  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: var(--pf-t--global--border--radius--pill);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--pf-t--global--font--size--sm);
    font-weight: var(--pf-t--global--font--weight--bold);
  }
  .msg-row.user .msg-avatar {
    background: var(--fa-navy-light);
    color: var(--fa-gold);
  }
  .msg-row.assistant .msg-avatar {
    background: var(--fa-gold);
    color: var(--fa-navy);
  }

  /* Bubbles following PF6 card pattern */
  .msg-body {}
  .msg-bubble {
    padding: var(--pf-t--global--spacer--sm) var(--pf-t--global--spacer--md);
    border-radius: var(--pf-t--global--border--radius--large);
    font-size: var(--pf-t--global--font--size--md);
    line-height: var(--pf-t--global--font--line-height--body);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-row.user .msg-bubble {
    background: var(--fa-navy);
    color: var(--pf-t--global--text--color--inverse);
    border-bottom-right-radius: var(--pf-t--global--border--radius--small);
  }
  .msg-row.assistant .msg-bubble {
    background: var(--pf-t--global--background--color--primary--default);
    border: var(--pf-t--global--border--width--box--default) solid var(--pf-t--global--border--color--default);
    border-bottom-left-radius: var(--pf-t--global--border--radius--small);
  }
  .msg-row.assistant .msg-bubble.error-bubble {
    background: var(--pf-t--global--color--status--danger--default);
    color: var(--pf-t--global--text--color--inverse);
    border-color: var(--pf-t--global--color--status--danger--default);
  }
  .msg-metrics {
    margin-top: var(--pf-t--global--spacer--xs);
    font-size: var(--pf-t--global--font--size--xs);
    color: var(--pf-t--global--text--color--subtle);
    font-family: var(--pf-t--global--font--family--mono);
  }

  /* Typing indicator */
  .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--pf-t--global--text--color--subtle);
    border-radius: 50%;
    margin: 0 2px;
    animation: dotBounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Quick actions - PF6 label group style */
  .quick-actions {
    padding: var(--pf-t--global--spacer--xs) var(--pf-t--global--spacer--md);
    display: flex;
    gap: var(--pf-t--global--spacer--sm);
    flex-wrap: wrap;
    justify-content: center;
  }
  .quick-btn {
    font-family: inherit;
    font-size: var(--pf-t--global--font--size--sm);
    padding: var(--pf-t--global--spacer--xs) var(--pf-t--global--spacer--md);
    border-radius: var(--pf-t--global--border--radius--pill);
    border: var(--pf-t--global--border--width--box--default) solid var(--pf-t--global--border--color--default);
    background: var(--pf-t--global--background--color--primary--default);
    color: var(--fa-navy);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .quick-btn:hover {
    background: var(--fa-navy);
    color: var(--fa-gold);
    border-color: var(--fa-navy);
  }

  /* Input area */
  .input-area {
    padding: var(--pf-t--global--spacer--sm) var(--pf-t--global--spacer--md) var(--pf-t--global--spacer--md);
    background: var(--pf-t--global--background--color--primary--default);
    border-top: var(--pf-t--global--border--width--box--default) solid var(--pf-t--global--border--color--default);
    flex-shrink: 0;
  }
  .input-row {
    max-width: 840px;
    margin: 0 auto;
    display: flex;
    gap: var(--pf-t--global--spacer--sm);
    align-items: flex-end;
  }
  .input-row textarea {
    flex: 1;
    font-family: inherit;
    font-size: var(--pf-t--global--font--size--md);
    padding: var(--pf-t--global--spacer--sm) var(--pf-t--global--spacer--md);
    border: var(--pf-t--global--border--width--box--default) solid var(--pf-t--global--border--color--default);
    border-radius: var(--pf-t--global--border--radius--medium);
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  .input-row textarea:focus {
    border-color: var(--pf-t--global--border--color--hover);
    box-shadow: 0 0 0 1px var(--pf-t--global--border--color--hover);
  }
  .send-btn {
    width: 42px; height: 42px;
    background: var(--fa-navy);
    border: none;
    border-radius: var(--pf-t--global--border--radius--medium);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--fa-gold); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  .send-btn:hover svg { fill: var(--fa-navy); }

  /* Footer */
  .demo-footer {
    text-align: center;
    padding: var(--pf-t--global--spacer--xs);
    font-size: var(--pf-t--global--font--size--xs);
    color: var(--pf-t--global--text--color--subtle);
    flex-shrink: 0;
  }
  .demo-footer .rh-red { color: #ee0000; font-weight: var(--pf-t--global--font--weight--bold); }
</style>
</head>
<body>

<header class="app-header">
  <a class="app-header__brand" href="/">
    <img src="/logo.svg" alt="Fed Aura Capital">
    <span class="app-header__brand-text">Fed <span class="brand-highlight">Aura</span> Capital</span>
  </a>
  <span class="user-label"><span class="status-dot"></span>Sarah Chen &mdash; Premier Banking</span>
</header>

<!-- Chat body -->
<div class="chat-wrapper">
  <div class="chat-messages" id="messages">
    <div class="welcome-block">
      <h2>Welcome back, Sarah</h2>
      <p>I'm Aura, your AI financial advisor. How can I help you today?</p>
    </div>
  </div>

  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" onclick="sendQuick('What is my checking account balance?')">Check my balance</button>
    <button class="quick-btn" onclick="sendQuick('Show my last 5 transactions')">Recent transactions</button>
    <button class="quick-btn" onclick="sendQuick('What mortgage rates do you offer? Am I eligible?')">Mortgage rates</button>
    <button class="quick-btn" onclick="sendQuick('How is my investment portfolio performing?')">Portfolio summary</button>
    <button class="quick-btn" onclick="sendQuick('Where is the nearest branch and what are the hours?')">Find a branch</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Ask Aura anything about your accounts..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="demo-footer">
  Powered by <span class="rh-red">Red Hat</span> OpenShift AI &middot; Model: Gemma4 via llm-d &middot; Observability: Perses + Prometheus
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const quickActionsEl = document.getElementById('quickActions');
let history = [];
let sending = false;

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendQuick(text) {
  inputEl.value = text;
  sendMessage();
}

function addMessage(role, content, metrics) {
  const div = document.createElement('div');
  div.className = `msg-row ${role}`;
  const initials = role === 'user' ? 'SC' : 'A';
  let metricsHtml = '';
  if (metrics) {
    metricsHtml = `<div class="msg-metrics">TTFT: ${metrics.ttft_ms}ms | Total: ${metrics.total_ms}ms</div>`;
  }
  div.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div class="msg-body">
      <div class="msg-bubble">${escapeHtml(content)}</div>
      ${metricsHtml}
    </div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg-row assistant';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">A</div>
    <div class="msg-body">
      <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  quickActionsEl.style.display = 'none';

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  addTypingIndicator();

  let fullResponse = '';
  let metrics = null;
  let bubbleEl = null;
  let isError = false;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          if (data.error) {
            removeTypingIndicator();
            const errDiv = addMessage('assistant', data.content);
            errDiv.querySelector('.msg-bubble').classList.add('error-bubble');
            isError = true;
            break;
          }

          if (data.content) {
            if (!bubbleEl) {
              removeTypingIndicator();
              const msgDiv = document.createElement('div');
              msgDiv.className = 'msg-row assistant';
              msgDiv.innerHTML = `
                <div class="msg-avatar">A</div>
                <div class="msg-body">
                  <div class="msg-bubble"></div>
                  <div class="msg-metrics" id="liveMetrics"></div>
                </div>`;
              messagesEl.appendChild(msgDiv);
              bubbleEl = msgDiv.querySelector('.msg-bubble');
            }
            fullResponse += data.content;
            bubbleEl.textContent = fullResponse;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }

          if (data.done) {
            metrics = { ttft_ms: data.ttft_ms, total_ms: data.total_ms };
            const metricsEl = document.getElementById('liveMetrics');
            if (metricsEl) {
              metricsEl.textContent = `TTFT: ${data.ttft_ms}ms | Total: ${data.total_ms}ms`;
            }
          }
        } catch (e) { /* skip malformed chunks */ }
      }
      if (isError) break;
    }
  } catch (err) {
    removeTypingIndicator();
    const errDiv = addMessage('assistant', `Connection error: ${err.message}`);
    errDiv.querySelector('.msg-bubble').classList.add('error-bubble');
    isError = true;
  }

  if (!isError && fullResponse) {
    history.push({ role: 'assistant', content: fullResponse });
  }

  removeTypingIndicator();
  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

inputEl.focus();
</script>
</body>
</html>
